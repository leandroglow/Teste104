<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visualizador 3D</title>

  <style>
    body {
      margin: 0;
      background: #bfc0c0;
      font-family: Arial, sans-serif;
    }

    #viewer {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #status {
      position: fixed;
      left: 15px;
      top: 15px;
      background: rgba(255,255,255,0.9);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10;
    }
  </style>
</head>

<body>
  <div id="status">Carregando modelo...</div>
  <div id="viewer"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { OBJLoader } from "three/addons/loaders/OBJLoader.js";
    import { MTLLoader } from "three/addons/loaders/MTLLoader.js";

    // NOMES DOS ARQUIVOS NO GITHUB
    const arquivoOBJ = "modelo.obj";
    const arquivoMTL = "modelo.mtl"; // se não tiver MTL, ele tenta carregar só o OBJ

    const status = document.getElementById("status");
    const container = document.getElementById("viewer");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xbfc0c0);

    const camera = new THREE.PerspectiveCamera(
      35,
      window.innerWidth / window.innerHeight,
      0.1,
      100000
    );

    camera.position.set(10, 8, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.HemisphereLight(0xffffff, 0x777777, 1.3));
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const luz = new THREE.DirectionalLight(0xffffff, 2);
    luz.position.set(10, 20, 10);
    luz.castShadow = true;
    luz.shadow.mapSize.width = 2048;
    luz.shadow.mapSize.height = 2048;
    scene.add(luz);

    const piso = new THREE.Mesh(
      new THREE.PlaneGeometry(10000, 10000),
      new THREE.ShadowMaterial({ opacity: 0.18 })
    );

    piso.rotation.x = -Math.PI / 2;
    piso.receiveShadow = true;
    scene.add(piso);

    function centralizarModelo(objeto) {
      const caixa = new THREE.Box3().setFromObject(objeto);
      const centro = caixa.getCenter(new THREE.Vector3());
      const tamanho = caixa.getSize(new THREE.Vector3());

      objeto.position.x -= centro.x;
      objeto.position.y -= centro.y;
      objeto.position.z -= centro.z;

      const caixaDepois = new THREE.Box3().setFromObject(objeto);
      piso.position.y = caixaDepois.min.y - 0.02;

      const maior = Math.max(tamanho.x, tamanho.y, tamanho.z);

      camera.position.set(maior * 1.4, maior, maior * 1.4);
      controls.target.set(0, 0, 0);
      controls.update();
    }

    function aplicarAparencia(objeto) {
      objeto.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;

          if (child.material) {
            const materiais = Array.isArray(child.material) ? child.material : [child.material];

            materiais.forEach((mat) => {
              mat.side = THREE.DoubleSide;

              if (mat.map) {
                mat.map.colorSpace = THREE.SRGBColorSpace;
                mat.map.needsUpdate = true;
              }

              mat.needsUpdate = true;
            });
          }
        }
      });
    }

    function carregarOBJComMateriais(materiais) {
      const objLoader = new OBJLoader();

      if (materiais) {
        objLoader.setMaterials(materiais);
      }

      objLoader.load(
        arquivoOBJ,
        function (objeto) {
          aplicarAparencia(objeto);
          scene.add(objeto);
          centralizarModelo(objeto);
          status.textContent = "Modelo carregado";
        },
        function (xhr) {
          if (xhr.lengthComputable) {
            const porcentagem = Math.round((xhr.loaded / xhr.total) * 100);
            status.textContent = "Carregando modelo... " + porcentagem + "%";
          }
        },
        function (erro) {
          console.error(erro);
          status.textContent = "Erro ao carregar o OBJ. Confira se o arquivo se chama modelo.obj";
        }
      );
    }

    function carregarModelo() {
      const mtlLoader = new MTLLoader();
      mtlLoader.setPath("./");

      mtlLoader.load(
        arquivoMTL,
        function (materiais) {
          materiais.preload();
          carregarOBJComMateriais(materiais);
        },
        undefined,
        function () {
          console.warn("MTL não encontrado. Carregando apenas OBJ.");
          carregarOBJComMateriais(null);
        }
      );
    }

    carregarModelo();

    function animar() {
      requestAnimationFrame(animar);
      controls.update();
      renderer.render(scene, camera);
    }

    animar();

    window.addEventListener("resize", function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
